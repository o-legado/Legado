<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recrutamento</title>
    <link rel="stylesheet" href="../../assets/css/scss/recrutamento.scss">
    <link rel="stylesheet" href="../../assets/css/css/recrutamento.css">
    <!--FONTE-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!--FONTE-->

    <!-- Google tag (gtag.js) -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-SW7Q9LH3LR"></script>

            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());
            gtag('config', 'G-SW7Q9LH3LR');
        </script> -->
    <!-- Google tag (gtag.js) -->

    <!--icon-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!--icon-->
</head>

<body>


    <main class="recruitment-main">

  <!-- ======================= HERO ======================= -->
  <section class="hero">
    <div class="hero__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 12h2m-1-1v2m7-2h.01M18 13h.01M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.104-.015.156L2 14.5A2.5 2.5 0 0 0 4.5 17c.626 0 1.226-.247 1.67-.687L8.5 14h7l2.33 2.313c.444.44 1.044.687 1.67.687a2.5 2.5 0 0 0 2.5-2.5l-.687-5.754c-.005-.052-.009-.104-.015-.156A4 4 0 0 0 17.32 5Z"
          stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="hero__title">
      FORMULÁRIO DE
      <span class="hero__title-highlight">RECRUTAMENTO</span>
    </h1>

    <p class="hero__subtitle">
      Preencha todas as informações abaixo para participar da seleção da equipe.
    </p>

    <div class="hero__badges">
      <span class="badge">
        <svg class="badge__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 12.2 10.5 14.7 16 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        VAGAS ABERTAS
      </span>

      <span class="badge">
        <svg class="badge__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M13 2 4 14h6.5L11 22l9-13h-6.5L13 2Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        RESPOSTA EM 24H
      </span>

      <span class="badge">
        <svg class="badge__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="12" cy="12" r="2.8" fill="currentColor"/>
        </svg>
        VIA WHATSAPP
      </span>
    </div>
  </section>

  <!-- ======================= PROGRESSO ======================= -->
  <section class="progress">
    <div class="progress__info">
      <span class="progress__label">PROGRESSO DO FORMULÁRIO</span>
      <span class="progress__percentage">38%</span>
    </div>
    <div class="progress__track">
      <div class="progress__fill" style="width: 38%;"></div>
    </div>
  </section>

  <!-- ======================= CARD 1: IDENTIFICAÇÃO (1/4) ======================= -->
  <section class="card">
    <div class="card__header">
      <div class="card__heading">
        <span class="card__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="8" r="3.6" stroke="currentColor" stroke-width="1.6"/>
            <path d="M4.5 20c0-3.3 3.4-6 7.5-6s7.5 2.7 7.5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <h2 class="card__title">IDENTIFICAÇÃO</h2>
      </div>
      <span class="card__step">1/4</span>
    </div>

    <form class="card__form">
      <div class="field">
        <label class="field__label" for="nick">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="8" r="3.4" stroke="currentColor" stroke-width="1.6"/>
            <path d="M5 20c0-3.1 3.1-5.6 7-5.6s7 2.5 7 5.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          NICK DO JOGADOR <span class="field__required">*</span>
        </label>
        <input class="field__input" type="text" id="nick" name="nick" placeholder="Seu nick no Free Fire" required>
      </div>

      <div class="field">
        <label class="field__label" for="playerId">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M5 9h14M5 15h14M10 3 8 21M16 3l-2 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ID DO JOGADOR <span class="field__required">*</span>
        </label>
        <input class="field__input" type="text" id="playerId" name="playerId" placeholder="Apenas números" inputmode="numeric" pattern="[0-9]*" required>
      </div>
    </form>
  </section>

  <!-- ======================= CARD 2: PERFIL COMPETITIVO (2/4) ======================= -->
  <section class="card">
    <div class="card__header">
      <div class="card__heading">
        <span class="card__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 12.2 10.5 14.7 16 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <h2 class="card__title">PERFIL COMPETITIVO</h2>
      </div>
      <span class="card__step">2/4</span>
    </div>

    <form class="card__form">

      <!-- Função no jogo: grid de botões selecionáveis -->
      <div class="field">
        <label class="field__label">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 3v18M6 4h11l-2.5 4L17 12H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          FUNÇÃO NO JOGO <span class="field__required">*</span>
        </label>

        <div class="role-grid">

          <button type="button" class="role-grid__item role-grid__item--selected">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M6 3v18M6 4h11l-2.5 4L17 12H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Primeiro Rush</span>
          </button>

          <button type="button" class="role-grid__item">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M8.5 3c3 3 5.5 6.5 5.5 10.5A5.5 5.5 0 0 1 8.5 19a5.5 5.5 0 0 1-5.5-5.5C3 9.5 5.5 6 8.5 3Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Segundo Rush</span>
          </button>

          <button type="button" class="role-grid__item">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 21s-7-4.35-9.5-8.8C.9 8.7 2.4 5 6 5c2 0 3.3 1.1 4 2.2A5 5 0 0 1 14 5c3.6 0 5.1 3.7 3.5 7.2C19 16.65 12 21 12 21Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
            <span>Suporte</span>
          </button>

          <button type="button" class="role-grid__item">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="11" cy="13" r="7" stroke="currentColor" stroke-width="1.6"/>
              <path d="M16 8l2.5-2.5M18 3l1.5 1.5M15 3l1.5 1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <span>Granadeiro</span>
          </button>

          <button type="button" class="role-grid__item">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="1" fill="currentColor"/>
            </svg>
            <span>CFT</span>
          </button>

          <button type="button" class="role-grid__item">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 3v6M9 6h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              <path d="M6 11h12l-1.2 8.4a2 2 0 0 1-2 1.6H9.2a2 2 0 0 1-2-1.6L6 11Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
            <span>Curandeiro</span>
          </button>

          <button type="button" class="role-grid__item">
            <svg class="role-grid__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 2c1.5 3-1.5 4.5-1.5 7.5A3.5 3.5 0 0 0 14 13c1.9 0 3.5-1.6 3.5-3.5 2 2.5 2.5 5 2.5 6.5a8 8 0 1 1-16 0C4 11 7 6.5 12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
            <span>Full Gás</span>
          </button>

        </div>
      </div>

      <!-- Tempo de experiência: select estilizado -->
      <div class="field">
        <label class="field__label" for="experiencia">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
            <path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          TEMPO DE EXPERIÊNCIA NO COMPETITIVO <span class="field__required">*</span>
        </label>

        <div class="field__select-wrapper">
          <select class="field__input field__select" id="experiencia" name="experiencia" required>
            <option value="" disabled selected>Selecione o tempo de experiência</option>
            <option value="menos-6-meses">Menos de 6 meses</option>
            <option value="6-meses-1-ano">6 meses a 1 ano</option>
            <option value="1-2-anos">1 a 2 anos</option>
            <option value="mais-2-anos">Mais de 2 anos</option>
          </select>
          <svg class="field__select-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <!-- Dispositivo -->
      <div class="field">
        <label class="field__label" for="dispositivo">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="6" y="2" width="12" height="20" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M10 18h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          DISPOSITIVO UTILIZADO PARA JOGAR <span class="field__required">*</span>
        </label>
        <input class="field__input" type="text" id="dispositivo" name="dispositivo" placeholder="Ex: Samsung Galaxy S24, iPhone 15, Redmi Note 13..." required>
      </div>

      <!-- Possui Discord: toggle Sim / Não -->
      <div class="field">
        <label class="field__label">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4" y="5" width="16" height="13" rx="4" stroke="currentColor" stroke-width="1.6"/>
            <circle cx="9" cy="11.5" r="1.2" fill="currentColor"/>
            <circle cx="15" cy="11.5" r="1.2" fill="currentColor"/>
          </svg>
          POSSUI DISCORD? <span class="field__required">*</span>
        </label>

        <div class="toggle">
          <button type="button" class="toggle__button toggle__button--yes toggle__button--selected">
            <svg class="toggle__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M5 12.5l4.5 4.5L19 7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Sim
          </button>
          <button type="button" class="toggle__button toggle__button--no">
            <svg class="toggle__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Não
          </button>
        </div>
      </div>

    </form>
  </section>

  <!-- ======================= CARD 3: DISPONIBILIDADE (3/4) ======================= -->
  <section class="card">
    <div class="card__header">
      <div class="card__heading">
        <span class="card__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M4 9.5h16M8 3v3.5M16 3v3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <h2 class="card__title">DISPONIBILIDADE</h2>
      </div>
      <span class="card__step">3/4</span>
    </div>

    <form class="card__form">

      <!-- Dias disponíveis: pílulas dos dias da semana -->
      <div class="field">
        <label class="field__label">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M4 9.5h16M8 3v3.5M16 3v3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          DIAS DISPONÍVEIS PARA JOGAR <span class="field__required">*</span>
        </label>

        <div class="day-picker">
          <button type="button" class="day-picker__day">Seg</button>
          <button type="button" class="day-picker__day">Ter</button>
          <button type="button" class="day-picker__day">Qua</button>
          <button type="button" class="day-picker__day">Qui</button>
          <button type="button" class="day-picker__day">Sex</button>
          <button type="button" class="day-picker__day">Sáb</button>
          <button type="button" class="day-picker__day">Dom</button>
        </div>
      </div>

      <!-- Horários -->
      <div class="field">
        <label class="field__label" for="horarios">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/>
            <path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          HORÁRIOS DISPONÍVEIS <span class="field__required">*</span>
        </label>
        <input class="field__input" type="text" id="horarios" name="horarios" placeholder="Ex: 19:00 as 23:00" required>
      </div>

      <!-- Dias em que não pode jogar -->
      <div class="field">
        <label class="field__label">
          <svg class="field__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="1.6"/>
            <path d="M4 9.5h16M8 3v3.5M16 3v3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          DIAS EM QUE NÃO PODE JOGAR <span class="field__required">*</span>
        </label>

        <div class="day-picker">
          <button type="button" class="day-picker__day">Seg</button>
          <button type="button" class="day-picker__day">Ter</button>
          <button type="button" class="day-picker__day">Qua</button>
          <button type="button" class="day-picker__day">Qui</button>
          <button type="button" class="day-picker__day">Sex</button>
          <button type="button" class="day-picker__day">Sáb</button>
          <button type="button" class="day-picker__day">Dom</button>
        </div>
      </div>

    </form>
  </section>

</main>


</body>

</html>
